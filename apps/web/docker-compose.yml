services:
  web:
    image: ghcr.io/zmaniacz/lfstats-web:latest
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DATABASE_URL: "postgres://lfstats:${DB_PASSWORD}@db:5432/lfstats_modern"
      AUTH_TRUST_HOST: "true"
      AUTH_URL: "https://modern.lfstats.com"
    ports:
      - "3000:3000"
    networks:
      - lfstats

networks:
  lfstats:
    external: true
